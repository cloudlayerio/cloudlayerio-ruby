plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false

Style/Documentation:
  Enabled: false

Gemspec/DevelopmentDependencies:
  EnforcedStyle: gemspec

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Metrics/MethodLength:
  Max: 15
  CountAsOne:
    - hash
    - heredoc
  Exclude:
    - "spec/**/*"

Metrics/ModuleLength:
  Max: 110
  Exclude:
    - "spec/**/*"

Metrics/ClassLength:
  Exclude:
    - "lib/cloudlayerio/http/transport.rb"

# API method names match the CloudLayer SDK convention across all languages
Naming/AccessorMethodName:
  Exclude:
    - "lib/cloudlayerio/api/**/*"

Naming/PredicateMethod:
  Exclude:
    - "lib/cloudlayerio/api/**/*"

# Disable all RuboCop-RSpec style/pedantry cops for spec files.
# Spec files are integration/unit tests — multiple expectations per example,
# inline stubs, and string describe blocks are intentional and readable.
RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/DescribeClass:
  Enabled: false

RSpec/SubjectStub:
  Enabled: false

RSpec/NoExpectationExample:
  Enabled: false

RSpec/LeadingSubject:
  Enabled: false

RSpec/BeEq:
  Enabled: false

# Allow {..} blocks for multi-line stubs in specs
Style/BlockDelimiters:
  Exclude:
    - "spec/**/*"

# Allow /regexp/ in specs (easier to read than %r{})
Style/RegexpLiteral:
  Exclude:
    - "spec/**/*"

# Disable Layout enforcement for spec files
Layout/MultilineMethodCallIndentation:
  Exclude:
    - "spec/**/*"

Layout/ParameterAlignment:
  Exclude:
    - "spec/**/*"

Layout/ArgumentAlignment:
  Exclude:
    - "spec/**/*"

Layout/FirstArrayElementIndentation:
  Exclude:
    - "spec/**/*"

Layout/FirstHashElementIndentation:
  Exclude:
    - "spec/**/*"

Layout/HashAlignment:
  Exclude:
    - "spec/**/*"

Layout/LineLength:
  Max: 160
  Exclude:
    - "spec/**/*"
