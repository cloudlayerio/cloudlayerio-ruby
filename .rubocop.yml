plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false

Style/Documentation:
  Enabled: false

Gemspec/DevelopmentDependencies:
  EnforcedStyle: gemspec

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Metrics/MethodLength:
  Max: 15
  CountAsOne:
    - hash
    - heredoc
  Exclude:
    - "spec/**/*"

Metrics/ModuleLength:
  Max: 110
  Exclude:
    - "spec/**/*"

Metrics/ClassLength:
  Exclude:
    - "lib/cloudlayerio/http/transport.rb"

# API method names match the CloudLayer SDK convention across all languages
Naming/AccessorMethodName:
  Exclude:
    - "lib/cloudlayerio/api/**/*"

Naming/PredicateMethod:
  Exclude:
    - "lib/cloudlayerio/api/**/*"

# RuboCop-RSpec cops: relax for integration-style specs with multiple
# assertions per example (testing request/response pairs requires >1 expect)
RSpec/ExampleLength:
  Max: 20

RSpec/MultipleExpectations:
  Max: 12

# cloudlayerio uses lowercase gem name, not cloud_layerio (namespaced separately)
RSpec/SpecFilePathFormat:
  Enabled: false

# Allow {..} blocks for multi-line stubs in specs
Style/BlockDelimiters:
  Exclude:
    - "spec/**/*"

# Allow /regexp/ in specs (easier to read than %r{})
Style/RegexpLiteral:
  Exclude:
    - "spec/**/*"

# Specs use string descriptions for behavior groups, not class names
RSpec/DescribeClass:
  Enabled: false

# Disable strict Layout enforcement for specs — stub_request chains and
# hash/array literals in specs don't benefit from alignment pedantry
Layout/MultilineMethodCallIndentation:
  Exclude:
    - "spec/**/*"

Layout/ParameterAlignment:
  Exclude:
    - "spec/**/*"

Layout/ArgumentAlignment:
  Exclude:
    - "spec/**/*"

Layout/FirstArrayElementIndentation:
  Exclude:
    - "spec/**/*"

Layout/FirstHashElementIndentation:
  Exclude:
    - "spec/**/*"

Layout/HashAlignment:
  Exclude:
    - "spec/**/*"

Layout/LineLength:
  Max: 160
  Exclude:
    - "spec/**/*"

# retry_policy_spec stubs rand on the policy instance to control jitter
RSpec/SubjectStub:
  Exclude:
    - "spec/cloudlayerio/http/retry_policy_spec.rb"
